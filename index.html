<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComidasComilonas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#03070f;--bg2:#0d1f3c;--bg3:#112444;--bg4:#1a3060;
  --border:#2a4a7a;--border2:#3a6aaa;
  --text:#f0f4ff;--text2:#8ba3cc;--text3:#3d5a88;
  --gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5e0a0;
  --gold-bg:#1a1408;--gold-border:#3a2c10;--gold-glow:#c9a84c25;
  --green:#22c98a;--green-bg:#051a10;--green-border:#0a3020;--green-text:#3ddf9a;
  --red:#e05555;--red-bg:#1a0808;--red-border:#3a1010;--red-text:#f07070;
  --orange-bg:#1a1408;--orange-border:#3a2c10;--orange-text:#e8c96a;
  --r-card:12px;--r-btn:8px;--r-pill:20px;
  --tr:0.15s ease;
  --mx:50%;--my:50%;
}
html{font-size:15px;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 700px 500px at var(--mx) var(--my),#0d3a7a 0%,transparent 65%),
  radial-gradient(ellipse 500px 400px at 15% 80%,#0a2255 0%,transparent 60%),
  radial-gradient(ellipse 400px 300px at 85% 10%,#0c1e40 0%,transparent 55%);
pointer-events:none;z-index:0;}
.page{max-width:460px;margin:0 auto;padding:28px 20px 48px;position:relative;z-index:1;}
input,button{font-family:'Inter',sans-serif;}
button{cursor:pointer;border:none;background:none;color:inherit;transition:all var(--tr);}
button:active{transform:scale(0.98);opacity:.8;}
input{outline:none;}

/* Header */
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#c9a84c,#8a6820);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 24px var(--gold-glow);}
.hdr-title{font-size:17px;font-weight:600;letter-spacing:-.3px;background:linear-gradient(90deg,#f0f4ff,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.back-btn{font-size:13px;font-weight:500;color:var(--text3);}
.back-btn:hover{color:var(--gold);}

/* Cards */
.card{background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);border-radius:var(--r-card);padding:18px 20px;position:relative;overflow:hidden;transition:border-color var(--tr),box-shadow var(--tr);}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 180px 180px at var(--cx,50%) var(--cy,50%),rgba(201,168,76,.09) 0%,transparent 70%);opacity:0;transition:opacity .25s;pointer-events:none;}
.card:hover::before{opacity:1;}
.card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.5),inset 0 0.5px 0 rgba(255,255,255,.06);}
.card-sm{background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);border-radius:var(--r-card);padding:14px 16px;transition:border-color var(--tr);}
.card-sm:hover{border-color:var(--border2);}

/* Avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}

/* Tabs */
.tabs{display:flex;background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);border-radius:var(--r-card);padding:4px;gap:4px;margin-bottom:28px;}
.tab{flex:1;padding:9px 0;font-size:13px;font-weight:500;color:var(--text3);border-radius:9px;transition:all var(--tr);background:none;border:none;}
.tab:hover{color:var(--text2);}
.tab.on{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));color:var(--gold);box-shadow:0 1px 8px rgba(0,0,0,.5),inset 0 0.5px 0 rgba(201,168,76,.2);}

/* Pills */
.pil-on{background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.08));border:1.5px solid var(--gold);color:var(--gold2);font-weight:600;}
.pil-off{background:transparent;border:0.5px solid var(--border2);color:var(--text3);}
.pil-off:hover{border-color:var(--text3);color:var(--text2);}

/* Buttons */
.btn{width:100%;padding:15px;font-size:14px;font-weight:600;border-radius:var(--r-btn);background:linear-gradient(135deg,#c9a84c,#8a6820);color:#fff;border:none;box-shadow:0 4px 20px var(--gold-glow);position:relative;overflow:hidden;transition:all var(--tr);}
.btn:hover{box-shadow:0 4px 32px #c9a84c50;transform:translateY(-1px);}
.btn-sec{padding:15px 20px;font-size:14px;font-weight:500;border-radius:var(--r-btn);background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);transition:all var(--tr);}
.btn-sec:hover{border-color:var(--gold);color:var(--gold);}

/* Total input */
.total-wrap{display:flex;align-items:center;background:linear-gradient(135deg,#0f2548,#091a35);border-radius:var(--r-card);padding:8px 20px 8px 24px;border:0.5px solid var(--border2);transition:all var(--tr);}
.total-wrap:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
.total-wrap input{flex:1;font-size:36px;font-weight:600;border:none;background:transparent;color:var(--text);width:100%;letter-spacing:-1px;font-feature-settings:'tnum';}
.total-wrap input::placeholder{color:var(--text3);}
.total-eur{font-size:22px;font-weight:300;color:var(--gold);opacity:.7;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat{border-radius:var(--r-card);padding:14px 12px;text-align:center;transition:transform var(--tr);}
.stat:hover{transform:translateY(-2px);}
.stat-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;opacity:.7;margin-bottom:6px;}
.stat-val{font-size:19px;font-weight:600;letter-spacing:-.5px;font-feature-settings:'tnum';}

/* Efectivo */
.ef-banner{display:flex;align-items:center;gap:14px;background:var(--red-bg);border-radius:var(--r-card);padding:14px 18px;margin-bottom:16px;border:0.5px solid var(--red-border);}
.ef-name{font-size:13px;font-weight:600;color:var(--red-text);}
.ef-reason{font-size:11px;color:var(--red-text);opacity:.7;margin-top:3px;}

/* Person cards */
.p-card{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);border-radius:var(--r-card);padding:16px 18px;margin-bottom:8px;border-left:3px solid;transition:all var(--tr);position:relative;overflow:hidden;}
.p-card::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(201,168,76,.05),transparent 60%);opacity:0;transition:opacity var(--tr);pointer-events:none;}
.p-card:hover{transform:translateX(3px);border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.p-card:hover::after{opacity:1;}

/* Saldo badge */
.sbadge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:var(--r-pill);white-space:nowrap;font-feature-settings:'tnum';}
.s-pos{color:var(--red-text);background:var(--red-bg);border:0.5px solid var(--red-border);}
.s-neg{color:var(--green-text);background:var(--green-bg);border:0.5px solid var(--green-border);}
.s-ok{color:var(--text3);font-size:12px;}

/* Flash / error */
.flash{background:var(--green-bg);border:0.5px solid var(--green-border);border-radius:var(--r-card);padding:13px 18px;color:var(--green-text);font-size:13px;font-weight:500;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.err{background:var(--red-bg);border:0.5px solid var(--red-border);border-radius:var(--r-card);padding:14px 18px;color:var(--red-text);font-size:13px;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,12,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(12px);}
.modal{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-radius:16px;padding:24px;max-width:310px;width:88%;border:0.5px solid var(--gold-border);}
.modal h3{font-size:16px;font-weight:600;margin-bottom:10px;color:var(--gold2);}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:12px;font-size:13px;font-weight:600;border-radius:var(--r-btn);}
.m-ok{background:var(--red-bg);color:var(--red-text);border:0.5px solid var(--red-border);}
.m-cancel{background:var(--bg4);border:0.5px solid var(--border2);color:var(--text2);}
.m-cancel:hover{border-color:var(--gold);color:var(--gold);}

/* Grupo list */
.grp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.grp-card{flex:1;background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);border-radius:var(--r-card);padding:16px 18px;cursor:pointer;text-align:left;transition:all var(--tr);position:relative;overflow:hidden;}
.grp-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.07),transparent);opacity:0;transition:opacity var(--tr);}
.grp-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5);}
.grp-card:hover::before{opacity:1;}
.grp-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.grp-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.ghost-btn{font-size:12px;font-weight:500;border-radius:var(--r-btn);padding:8px 12px;border:0.5px solid var(--border2);color:var(--text3);display:flex;align-items:center;gap:5px;}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold);}
.danger-btn{font-size:12px;font-weight:500;border-radius:var(--r-btn);padding:8px 12px;border:0.5px solid var(--red-border);color:var(--red-text);}
.danger-btn:hover{background:var(--red-bg);}

/* New grupo */
.new-row{display:flex;gap:8px;}
.new-row input{flex:1;background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);color:var(--text);border-radius:var(--r-btn);padding:12px 16px;font-size:14px;transition:all var(--tr);}
.new-row input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
.new-row button{padding:12px 16px;font-size:14px;font-weight:600;border-radius:var(--r-btn);background:linear-gradient(135deg,#c9a84c,#8a6820);color:#fff;flex-shrink:0;transition:all var(--tr);}
.new-row button:hover{box-shadow:0 4px 20px var(--gold-glow);transform:translateY(-1px);}

/* Setup */
.setup-input{width:100%;background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);color:var(--text);border-radius:var(--r-btn);padding:12px 16px;font-size:15px;font-weight:500;transition:all var(--tr);}
.setup-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow);}
.name-input{flex:1;border:none;background:transparent;font-size:14px;font-weight:500;color:var(--text);}
.edit-input{font-size:14px;font-weight:500;width:100%;padding:4px 10px;border-radius:var(--r-btn);background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);}
.edit-input:focus{border-color:var(--gold);}
.num-btns{display:flex;gap:6px;}
.num-btn{flex:1;padding:11px 0;font-size:15px;font-weight:600;border-radius:var(--r-btn);}
.modo-btns{display:flex;gap:6px;margin-bottom:20px;}
.modo-btn{flex:1;padding:9px 4px;font-size:12px;font-weight:500;border-radius:var(--r-btn);}

/* Historial */
.h-card{background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);border-radius:var(--r-card);padding:16px 18px;margin-bottom:8px;transition:border-color var(--tr);}
.h-card:hover{border-color:var(--border2);}
.h-row{display:flex;align-items:center;gap:10px;background:var(--bg4);border-radius:8px;padding:9px 12px;border-left:3px solid;margin-bottom:5px;}

/* Layout */
.row{display:flex;align-items:center;gap:12px;}
.section{margin-bottom:24px;}
.confirm-row{display:flex;gap:8px;}
.confirm-row>button:first-child{flex:1;}
.divider{height:0.5px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0;}
.empty{text-align:center;padding:48px 0;color:var(--text3);font-size:14px;}
.spacer{height:8px;}
.lbl{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const SK="tickets_v2";
const MIN_D=-4,MAX_S=3,MAX_T=10;
const PAL=[
  {accent:"#c9a84c",bg:"rgba(201,168,76,.12)",text:"#e8c96a"},
  {accent:"#4a9edd",bg:"rgba(74,158,221,.12)",text:"#7ab8f5"},
  {accent:"#f0f4ff",bg:"rgba(240,244,255,.1)",text:"#c8d8f0"},
  {accent:"#22c98a",bg:"rgba(34,201,138,.12)",text:"#3ddf9a"},
];

// ── Storage ──
function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}

// ── Estado ──
let S={
  grupos:[{id:1,nombre:"Grupo 1",n:3,nombres:["Persona 1","Persona 2","Persona 3"],saldos:[0,0,0],historial:[],modo:"eficiente"}],
  gi:0,screen:"splash",tab:"calc",
  total:"",sol:null,conf:false,flash:false,
  editIdx:null,setup:null,nNombre:"",modal:null,
};

function gr(){return S.grupos[S.gi]||S.grupos[0];}

function set(p){Object.assign(S,p);render();}

// CRÍTICO: upGr actualiza el grupo Y guarda, sin depender de S.screen
function upGr(patch){
  const idx=S.gi;
  S.grupos=S.grupos.map((g,i)=>{
    if(i!==idx)return g;
    const updated={...g,...patch};
    return updated;
  });
  save({grupos:S.grupos,gi:S.gi,screen:S.screen});
  render();
}

function parseMonto(v){
  if(!v)return 0;
  const s=String(v).trim();
  if(s.includes(',')&&s.includes('.')){
    if(s.lastIndexOf(',')>s.lastIndexOf('.'))return parseFloat(s.replace(/\./g,'').replace(',','.'));
    return parseFloat(s.replace(/,/g,''));
  }
  if(s.includes(','))return parseFloat(s.replace(',','.'));
  return parseFloat(s)||0;
}

// ── Algoritmo ──
function calcular(total,saldos,n,modo){
  const a5=modo!=="88",a8=modo!=="55";
  const m5=modo==="85"?1:0,m8=modo==="85"?1:0;
  const pm={};
  for(let t5=m5;t5<=(a5?MAX_T:m5);t5++)
    for(let t8=m8;t8<=(a8?MAX_T:m8);t8++){
      const v=t5*5+t8*8;if(!(v in pm))pm[v]=[t5,t8];
    }
  const pos=Object.keys(pm).map(Number).sort((a,b)=>a-b);
  let best=null,bs=Infinity;
  function rec(idx,asig,gastos,pag){
    if(idx===n){
      const diff=pag-total;
      if(diff<MIN_D||diff>MAX_S)return;
      const ideal=pag/n;
      const desv=gastos.reduce((acc,g,i)=>{
        const ex=g-ideal;
        const pen=ex>0?(saldos[i]<0?Math.abs(ex)*3:Math.abs(ex)):(saldos[i]>0?Math.abs(ex)*3:Math.abs(ex));
        return acc+pen;
      },0);
      const sc=Math.abs(diff)*5+desv+asig.reduce((a,[t5,t8])=>a+t5+t8,0)*0.01;
      if(sc<bs-0.001){bs=sc;best={asig:asig.map(x=>[...x]),pagado:pag,diff,gastos:[...gastos]};}
      return;
    }
    const minP=pag+pos[0]*(n-idx),maxP=pag+pos[pos.length-1]*(n-idx);
    if(minP>total+MAX_S||maxP<total+MIN_D)return;
    for(const v of pos)rec(idx+1,[...asig,pm[v]],[...gastos,v],pag+v);
  }
  rec(0,[],[],0);
  return best;
}

// ── Iconos SVG inline ──
const ICO={
  "card":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`,
  "left":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  "cog":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  "trash":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
  "check":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  "ok":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  "warn":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  "calc":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>`,
  "bar":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
  "clock":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  "zap":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  "layers":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
  "ticket":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>`,
  "pen":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  "cal":`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,

};
function ic(k,sz=16){
  const s=(ICO[k]||"").replace('<svg ','<svg width="'+sz+'" height="'+sz+'" ');
  return`<span style="display:inline-flex;align-items:center;justify-content:center;width:${sz}px;height:${sz}px;flex-shrink:0;line-height:1;">${s}</span>`;
}

// ── UI helpers ──
function p(i){return PAL[i%PAL.length];}
function av(nm,i,sz=36){const pl=p(i);return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.37)}px;background:${pl.bg};color:${pl.text};border:0.5px solid ${pl.accent}33;">${(nm||"?")[0].toUpperCase()}</div>`;}
function sb(val){
  if(Math.abs(val)<0.005)return`<span class="s-ok">Al día</span>`;
  return val>0?`<span class="sbadge s-pos">+${val.toFixed(2)}€</span>`:`<span class="sbadge s-neg">${val.toFixed(2)}€</span>`;
}
function pc(on){return on?"pil-on":"pil-off";}

function renderResultado(){
  const el=document.getElementById("resultado");
  if(!el)return;
  const g=gr(),total=parseMonto(S.total),sol=S.sol;
  if(!sol||!total||total<=0){
    el.innerHTML=(total>0&&!sol)?`<div class="err">${ic("warn",14)} Sin combinación válida para ese importe.</div>`:"";
    return;
  }
  const efIdx=sol.diff<-0.01?(()=>{let idx=0,best=-Infinity;for(let i=0;i<g.n;i++){const sc=g.saldos[i]+(sol.pagado/g.n-sol.gastos[i])*.01;if(sc>best){best=sc;idx=i;}}return idx;})():null;
  const dL=sol.diff===0?"Exacto":sol.diff>0?"Se regalan":"Faltan";
  const dV=sol.diff===0?"✓":`${Math.abs(sol.diff).toFixed(2)}€`;
  const dBg=sol.diff===0?"var(--green-bg)":sol.diff>0?"var(--orange-bg)":"var(--red-bg)";
  const dBd=sol.diff===0?"var(--green-border)":sol.diff>0?"var(--orange-border)":"var(--red-border)";
  const dC=sol.diff===0?"var(--green-text)":sol.diff>0?"var(--orange-text)":"var(--red-text)";

  let html=`<div class="stats">
    <div class="stat" style="background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);"><div class="stat-lbl" style="color:var(--text3);">Cuenta</div><div class="stat-val" style="color:var(--text2);">${total.toFixed(2)}€</div></div>
    <div class="stat" style="background:linear-gradient(135deg,#0f2548,#091a35);border:0.5px solid var(--border);"><div class="stat-lbl" style="color:var(--text3);">Con tickets</div><div class="stat-val" style="color:var(--text2);">${sol.pagado.toFixed(2)}€</div></div>
    <div class="stat" style="background:${dBg};border:0.5px solid ${dBd};"><div class="stat-lbl" style="color:${dC};">${dL}</div><div class="stat-val" style="color:${dC};">${dV}</div></div>
  </div>`;

  if(efIdx!==null){
    html+=`<div class="ef-banner">${av(g.nombres[efIdx],efIdx,34)}<div><div class="ef-name">${ic("warn",13)} ${g.nombres[efIdx]} paga ${Math.abs(sol.diff).toFixed(2)}€ en efectivo</div><div class="ef-reason">${g.saldos[efIdx]>.01?`Debe ${g.saldos[efIdx].toFixed(2)}€ acumulados al grupo`:"Menos aportación en tickets esta vez"}</div></div></div>`;
  }

  for(let i=0;i<g.n;i++){
    const pl=p(i);
    const [t5,t8]=sol.asig[i];
    const gasto=sol.gastos[i],ideal=sol.pagado/g.n,ex=Math.round((gasto-ideal)*100)/100;
    const tks=[t8>0?`${t8}×8€`:"",t5>0?`${t5}×5€`:""].filter(Boolean).join(" + ")||"—";
    const esEf=efIdx===i;
    html+=`<div class="p-card" style="border-left-color:${esEf?"var(--red-text)":pl.accent};">
      ${av(g.nombres[i],i,38)}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:14px;margin-bottom:3px;">${g.nombres[i]}</div>
        <div style="font-size:12px;color:var(--text3);font-feature-settings:'tnum';">${ic("ticket",12)} ${tks}${esEf&&sol.diff<-0.01?` <span style="color:var(--red-text);">+ ${Math.abs(sol.diff).toFixed(2)}€ ef.</span>`:""}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:20px;font-weight:700;letter-spacing:-1px;font-feature-settings:'tnum';">${(esEf&&sol.diff<-0.01?gasto+Math.abs(sol.diff):gasto).toFixed(2)}€</div>
        ${Math.abs(ex)>.01?`<div style="font-size:11px;font-weight:500;color:${ex>0?"var(--red-text)":"var(--green-text)"};">${ex>0?`+${ex.toFixed(2)}€ de más`:`${Math.abs(ex).toFixed(2)}€ de menos`}</div>`:""}
      </div>
    </div>`;
  }

  html+=`<div class="spacer"></div>`;
  if(!S.conf){
    html+=`<button class="btn" onclick="set({conf:true})">${ic("check",16)} Confirmar y guardar saldos</button>`;
  }else{
    html+=`<div class="confirm-row"><button class="btn" onclick="confirmarPago()">${ic("check",16)} Confirmar</button><button class="btn-sec" onclick="set({conf:false})">Cancelar</button></div>`;
  }
  el.innerHTML=html;
}

// ── Acciones ──
function openGrupo(i){S.gi=i;S.total="";S.sol=null;S.tab="calc";S.conf=false;S.screen="app";save({grupos:S.grupos,gi:i,screen:"app"});render();}
function editGrupo(i){S.gi=i;S.setup={...S.grupos[i],nombres:[...S.grupos[i].nombres],saldos:[...S.grupos[i].saldos]};S.screen="setup";render();}
function goGrupos(){S.screen="grupos";save({grupos:S.grupos,gi:S.gi,screen:"grupos"});render();}

function addGrupo(){
  const nm=S.nNombre.trim()||`Grupo ${S.grupos.length+1}`;
  const ng={id:Date.now(),nombre:nm,n:3,nombres:["Persona 1","Persona 2","Persona 3"],saldos:[0,0,0],historial:[],modo:"eficiente"};
  S.grupos=[...S.grupos,ng];S.gi=S.grupos.length-1;
  S.setup={...ng,nombres:[...ng.nombres],saldos:[...ng.saldos]};
  S.nNombre="";S.screen="setup";
  save({grupos:S.grupos,gi:S.gi,screen:"setup"});render();
}

function delGrupo(i){S.modal={msg:`Se eliminará "${S.grupos[i].nombre}" con todos sus saldos e historial.`,action:"delete",idx:i};render();}

function resetSaldos(){S.modal={msg:`Se borrarán todos los saldos e historial de "${gr().nombre}". Esta acción no se puede deshacer.`,action:"reset"};render();}

function closeModal(){S.modal=null;render();}

function confirmModal(){
  const m=S.modal;
  if(m.action==="delete"){
    let next=S.grupos.filter((_,i)=>i!==m.idx);
    if(!next.length)next=[{id:Date.now(),nombre:"Grupo 1",n:3,nombres:["Persona 1","Persona 2","Persona 3"],saldos:[0,0,0],historial:[],modo:"eficiente"}];
    S.grupos=next;S.gi=0;S.screen="grupos";
    save({grupos:S.grupos,gi:0,screen:"grupos"});
  }else if(m.action==="reset"){
    // Reset directo sin pasar por upGr para evitar problemas
    S.grupos=S.grupos.map((g,i)=>i===S.gi?{...g,saldos:Array(g.n).fill(0),historial:[]}:g);
    save({grupos:S.grupos,gi:S.gi,screen:S.screen});
  }
  S.modal=null;render();
}

function setupN(n){
  const s=S.setup;
  const nms=[...s.nombres];while(nms.length<n)nms.push(`Persona ${nms.length+1}`);
  const sls=[...s.saldos];while(sls.length<n)sls.push(0);
  S.setup={...s,n,nombres:nms.slice(0,n),saldos:sls.slice(0,n)};render();
}

function confirmSetup(){
  const sd=S.setup;
  const pat={...sd,nombres:sd.nombres.map((nm,i)=>nm.trim()||`Persona ${i+1}`)};
  S.grupos=S.grupos.map((g,i)=>i===S.gi?pat:g);
  save({grupos:S.grupos,gi:S.gi,screen:"app"});
  S.total="";S.sol=null;S.screen="app";S.tab="calc";render();
}

function setModo(modo){
  S.grupos=S.grupos.map((g,i)=>i===S.gi?{...g,modo}:g);
  save({grupos:S.grupos,gi:S.gi,screen:S.screen});
  S.conf=false;
  const t=parseMonto(S.total);
  S.sol=t>0?calcular(t,gr().saldos,gr().n,modo):null;
  render();
}

function onTotal(val){
  S.total=val;S.conf=false;
  const t=parseMonto(val);
  S.sol=t>0?calcular(t,gr().saldos,gr().n,gr().modo):null;
  renderResultado();
}

function confirmarPago(){
  const sol=S.sol;if(!sol)return;
  const g=gr();
  const t=parseMonto(S.total);
  const ideal=sol.pagado/g.n;
  // Calcular nuevos saldos
  const nuevosSaldos=g.saldos.map((s,i)=>{
    const diff=ideal-sol.gastos[i]; // positivo = pagó de menos, debe al grupo
    return Math.round((s+diff)*100)/100;
  });
  const nuevaEntrada={
    fecha:new Date().toLocaleDateString("es-ES"),
    total:t,
    pagado:sol.pagado,
    gastos:[...sol.gastos],
    nombres:[...g.nombres]
  };
  // Actualizar directamente en S.grupos
  S.grupos=S.grupos.map((gr,i)=>{
    if(i!==S.gi)return gr;
    return{...gr,saldos:nuevosSaldos,historial:[nuevaEntrada,...gr.historial]};
  });
  save({grupos:S.grupos,gi:S.gi,screen:S.screen});
  S.total="";S.sol=null;S.conf=false;S.flash=true;S.tab="saldos";
  setTimeout(()=>{S.flash=false;render();},3000);
  render();
}

function saveNm(i,val){
  if(val.trim()){
    S.grupos=S.grupos.map((g,idx)=>{
      if(idx!==S.gi)return g;
      const nombres=[...g.nombres];nombres[i]=val.trim();
      return{...g,nombres};
    });
    save({grupos:S.grupos,gi:S.gi,screen:S.screen});
  }
  S.editIdx=null;render();
}

// ── Mouse tracker ──
document.addEventListener('mousemove',e=>{
  document.documentElement.style.setProperty('--mx',((e.clientX/window.innerWidth)*100).toFixed(1)+'%');
  document.documentElement.style.setProperty('--my',((e.clientY/window.innerHeight)*100).toFixed(1)+'%');
  document.querySelectorAll('.card,.p-card,.grp-card').forEach(el=>{
    const r=el.getBoundingClientRect();
    el.style.setProperty('--cx',((e.clientX-r.left)/r.width*100).toFixed(1)+'%');
    el.style.setProperty('--cy',((e.clientY-r.top)/r.height*100).toFixed(1)+'%');
  });
});

// ── Init ──
const saved=load();
if(saved){
  if(saved.grupos)S.grupos=saved.grupos;
  if(saved.gi!==undefined)S.gi=saved.gi;
  // Siempre arranca en splash
}
render();
</script>
