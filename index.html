<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets de comida</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;
    --border:#2a2a2a;--border2:#383838;
    --text:#f2f2f2;--text2:#909090;--text3:#505050;
    --purple:#8B83E8;--purple-dim:#2a2660;
    --green:#22c98a;--green-bg:#0a2318;--green-border:#1a4a30;--green-text:#4ddb9e;
    --red:#f07070;--red-bg:#2a0f0f;--red-border:#4a1f1f;--red-text:#f08080;
    --orange:#e8a84a;--orange-bg:#281a08;--orange-border:#4a3010;--orange-text:#f0bc6a;
    --blue:#7ab8f5;--blue-bg:#0a1828;--blue-border:#1a3048;--blue-text:#8ec8ff;
    --r0:8px;--r1:14px;--r2:18px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem;}
  .wrap{max-width:460px;margin:0 auto;}
  input,button{font-family:inherit;}
  button{cursor:pointer;border:none;background:none;color:inherit;}

  /* Header */
  .logo{width:42px;height:42px;border-radius:var(--r1);background:linear-gradient(135deg,#7F77DD,#5a52cc);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px #7F77DD40;}
  .hdr{display:flex;align-items:center;gap:14px;margin-bottom:2rem;}
  .hdr-title{font-weight:600;font-size:18px;letter-spacing:-0.3px;}
  .hdr-sub{font-size:12px;color:var(--text3);margin-top:3px;}
  .back-btn{font-size:13px;color:var(--text3);padding:0;transition:color .15s;}
  .back-btn:hover{color:var(--text2);}

  /* Labels */
  .lbl{font-size:10.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;font-weight:500;}

  /* Cards */
  .card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:13px 15px;}
  .row{display:flex;align-items:center;gap:12px;}

  /* Avatar */
  .av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}

  /* Pills */
  .pil-on{background:#8B83E818;border:1.5px solid var(--purple);color:var(--text);font-weight:500;}
  .pil-off{background:transparent;border:0.5px solid var(--border2);color:var(--text3);}

  /* Tabs */
  .tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.75rem;}
  .tab{flex:1;padding:11px 0;font-size:13px;color:var(--text3);border:none;border-bottom:2px solid transparent;background:none;transition:color .15s;}
  .tab.on{color:var(--text);border-bottom-color:var(--purple);font-weight:500;}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
  .stat{border-radius:var(--r1);padding:13px 10px;text-align:center;}
  .stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;opacity:.75;margin-bottom:5px;font-weight:500;}
  .stat-val{font-size:18px;font-weight:600;letter-spacing:-.3px;}

  /* Buttons */
  .btn{width:100%;padding:14px;font-size:14px;font-weight:600;border-radius:var(--r1);background:linear-gradient(135deg,#8B83E8,#6b63d8);color:#EEEDFE;border:none;letter-spacing:.01em;transition:opacity .15s;box-shadow:0 4px 16px #7F77DD30;}
  .btn:hover{opacity:.9;}
  .btn-sec{padding:14px 18px;font-size:14px;border-radius:var(--r1);background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);}

  /* Total input */
  .total-wrap{display:flex;align-items:center;background:var(--bg2);border-radius:var(--r2);padding:6px 18px 6px 22px;border:0.5px solid var(--border2);transition:border-color .15s;}
  .total-wrap:focus-within{border-color:var(--purple);}
  .total-wrap input{flex:1;font-size:32px;font-weight:600;border:none;background:transparent;color:var(--text);outline:none;width:100%;letter-spacing:-.5px;}
  .total-eur{font-size:20px;color:var(--text3);font-weight:300;}

  /* Efectivo banner */
  .ef-banner{display:flex;align-items:center;gap:12px;background:var(--red-bg);border-radius:var(--r1);padding:11px 15px;margin-bottom:1rem;border:0.5px solid var(--red-border);}
  .ef-name{font-size:13px;font-weight:600;color:var(--red-text);}
  .ef-reason{font-size:11px;color:var(--red-text);opacity:.75;margin-top:2px;}

  /* Saldo badge */
  .sbadge{font-size:12px;font-weight:500;padding:3px 11px;border-radius:20px;white-space:nowrap;}
  .s-pos{color:var(--red-text);background:var(--red-bg);}
  .s-neg{color:var(--green-text);background:var(--green-bg);}
  .s-ok{color:var(--text3);font-size:12px;}

  /* Flash */
  .flash{background:var(--green-bg);border:0.5px solid var(--green-border);border-radius:var(--r1);padding:11px 15px;color:var(--green-text);font-size:13px;font-weight:500;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;}

  /* Error */
  .err{background:var(--red-bg);border:0.5px solid var(--red-border);border-radius:var(--r1);padding:13px 15px;color:var(--red-text);font-size:13px;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
  .modal{background:var(--bg2);border-radius:var(--r2);padding:1.5rem;max-width:300px;width:88%;border:0.5px solid var(--border2);}
  .modal h3{font-weight:600;font-size:15px;margin-bottom:8px;}
  .modal p{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.5;}
  .modal-btns{display:flex;gap:8px;}
  .modal-btns button{flex:1;padding:11px;font-size:13px;border-radius:var(--r0);font-weight:500;}
  .m-ok{background:var(--red-bg);color:var(--red-text);border:0.5px solid var(--red-border);}
  .m-cancel{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);}

  /* Grupo list */
  .grp-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .grp-card{flex:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:13px 15px;cursor:pointer;text-align:left;transition:border-color .15s;}
  .grp-card:hover{border-color:var(--border2);}
  .grp-name{font-weight:500;font-size:15px;margin-bottom:3px;}
  .grp-meta{font-size:12px;color:var(--text3);}
  .ghost-btn{font-size:12px;border-radius:var(--r0);padding:7px 11px;border:0.5px solid var(--border2);color:var(--text3);}
  .danger-btn{font-size:12px;border-radius:var(--r0);padding:7px 11px;border:0.5px solid var(--red-border);color:var(--red-text);}

  /* New grupo row */
  .new-row{display:flex;gap:8px;}
  .new-row input{flex:1;background:var(--bg2);border:0.5px solid var(--border);color:var(--text);border-radius:var(--r1);padding:11px 14px;font-size:14px;outline:none;}
  .new-row input:focus{border-color:var(--purple);}
  .new-row button{padding:11px 16px;font-size:14px;font-weight:600;border-radius:var(--r1);background:linear-gradient(135deg,#8B83E8,#6b63d8);color:#EEEDFE;flex-shrink:0;}

  /* Num btns */
  .num-btns{display:flex;gap:6px;margin-bottom:0;}
  .num-btn{flex:1;padding:11px 0;font-size:15px;border-radius:var(--r1);font-weight:500;}

  /* Modo btns */
  .modo-btns{display:flex;gap:6px;margin-bottom:1.25rem;}
  .modo-btn{flex:1;padding:9px 4px;font-size:12px;border-radius:var(--r0);font-weight:500;}

  /* Setup inputs */
  .setup-input{width:100%;background:var(--bg2);border:0.5px solid var(--border);color:var(--text);border-radius:var(--r1);padding:11px 14px;font-size:15px;font-weight:500;outline:none;}
  .setup-input:focus{border-color:var(--purple);}

  .name-input{flex:1;border:none;background:transparent;font-size:14px;padding:0;color:var(--text);outline:none;}

  /* Person card in result */
  .p-card{display:flex;align-items:center;gap:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:13px 15px;margin-bottom:6px;border-left:3px solid;}

  /* Historial */
  .h-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:13px 15px;margin-bottom:8px;}
  .h-row{display:flex;align-items:center;background:var(--bg3);border-radius:var(--r0);padding:8px 11px;border-left:3px solid;}

  .edit-input{font-size:14px;font-weight:500;width:100%;padding:3px 8px;border-radius:var(--r0);background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);outline:none;}

  .section{margin-bottom:1.25rem;}
  .confirm-row{display:flex;gap:8px;}
  .confirm-row>button:first-child{flex:1;}

  .divider{height:0.5px;background:var(--border);margin:1.5rem 0;}

  .empty{text-align:center;padding:3rem 0;color:var(--text3);font-size:14px;}
  .empty-icon{font-size:32px;margin-bottom:10px;opacity:.4;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const SK="tickets_v2";
const MIN_D=-4,MAX_S=3,MAX_T=10;
const PAL=[
  {accent:"#378ADD",bg:"var(--blue-bg)",text:"var(--blue-text)"},
  {accent:"#22c98a",bg:"var(--green-bg)",text:"var(--green-text)"},
  {accent:"#e8a84a",bg:"var(--orange-bg)",text:"var(--orange-text)"},
  {accent:"#f07070",bg:"var(--red-bg)",text:"var(--red-text)"},
];

function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}

let S={
  grupos:[{id:1,nombre:"Grupo 1",n:3,nombres:["Persona 1","Persona 2","Persona 3"],saldos:[0,0,0],historial:[],modo:"eficiente"}],
  gi:0, screen:"grupos", tab:"calc",
  total:"", sol:null, conf:false, flash:false,
  editIdx:null, setup:null, nNombre:"", modal:null,
};

function set(p){Object.assign(S,p);render();}
function gr(){return S.grupos[S.gi]||S.grupos[0];}
function upGr(p){
  S.grupos=S.grupos.map((g,i)=>i===S.gi?{...g,...p}:g);
  save({grupos:S.grupos,gi:S.gi,screen:S.screen});
  render();
}

function parseMonto(v){
  // acepta coma o punto como decimal
  return parseFloat(String(v).replace(",","."));
}

function calcular(total,saldos,n,modo){
  const a5=modo!=="88",a8=modo!=="55";
  const m5=modo==="85"?1:0,m8=modo==="85"?1:0;
  const pm={};
  for(let t5=m5;t5<=(a5?MAX_T:m5);t5++)
    for(let t8=m8;t8<=(a8?MAX_T:m8);t8++){
      const v=t5*5+t8*8;if(!(v in pm))pm[v]=[t5,t8];
    }
  const pos=Object.keys(pm).map(Number).sort((a,b)=>a-b);
  let best=null,bs=Infinity;
  function rec(idx,asig,gastos,pag){
    if(idx===n){
      const diff=pag-total;
      if(diff<MIN_D||diff>MAX_S)return;
      const ideal=pag/n;
      const desv=gastos.reduce((acc,g,i)=>{
        const ex=g-ideal;
        const pen=ex>0?(saldos[i]<0?Math.abs(ex)*3:Math.abs(ex)):(saldos[i]>0?Math.abs(ex)*3:Math.abs(ex));
        return acc+pen;
      },0);
      const sc=Math.abs(diff)*5+desv+asig.reduce((a,[t5,t8])=>a+t5+t8,0)*0.01;
      if(sc<bs-0.001){bs=sc;best={asig:asig.map(x=>[...x]),pagado:pag,diff,gastos:[...gastos]};}
      return;
    }
    const minP=pag+pos[0]*(n-idx),maxP=pag+pos[pos.length-1]*(n-idx);
    if(minP>total+MAX_S||maxP<total+MIN_D)return;
    for(const v of pos)rec(idx+1,[...asig,pm[v]],[...gastos,v],pag+v);
  }
  rec(0,[],[],0);
  return best;
}

// ── UI helpers ──
function p(i){return PAL[i%PAL.length];}
function av(nm,i,sz=36){const pl=p(i);return `<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.35}px;background:${pl.bg};color:${pl.text};">${(nm||"?")[0].toUpperCase()}</div>`;}
function sb(val){
  if(Math.abs(val)<0.005)return`<span class="s-ok">Al día</span>`;
  return val>0?`<span class="sbadge s-pos">+${val.toFixed(2)}€</span>`:`<span class="sbadge s-neg">${val.toFixed(2)}€</span>`;
}
function pc(on){return on?"pil-on":"pil-off";}
function logo(){return`<div class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EEEDFE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M22 10H2"/></svg></div>`;}

// ── Render ──
// El input de total NO se regenera si ya existe — solo actualizamos el resultado
let lastScreen="", lastTab="";

function render(){
  const app=document.getElementById("app");
  let html="";

  if(S.modal){
    html+=`<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
      <h3>¿Estás seguro?</h3><p>${S.modal.msg}</p>
      <div class="modal-btns"><button class="m-cancel" onclick="closeModal()">Cancelar</button><button class="m-ok" onclick="confirmModal()">Confirmar</button></div>
    </div></div>`;
  }

  if(S.screen==="grupos"){
    html+=`<div class="hdr">${logo()}<div><div class="hdr-title">Tickets de comida</div><div class="hdr-sub">Selecciona un grupo</div></div></div>`;
    S.grupos.forEach((g,i)=>{
      html+=`<div class="grp-row">
        <button class="grp-card" onclick="openGrupo(${i})">
          <div class="grp-name">${g.nombre}</div>
          <div class="grp-meta">${g.n} personas · ${g.historial.length} comidas</div>
        </button>
        <button class="ghost-btn" onclick="editGrupo(${i})">Editar</button>
        ${S.grupos.length>1?`<button class="danger-btn" onclick="delGrupo(${i})">Borrar</button>`:""}
      </div>`;
    });
    html+=`<div style="height:1px;background:var(--border);margin:1rem 0;"></div>`;
    html+=`<div class="new-row"><input id="nni" placeholder="Nombre del nuevo grupo" value="${S.nNombre}" oninput="S.nNombre=this.value" onkeydown="if(event.key==='Enter')addGrupo()"><button onclick="addGrupo()">+ Nuevo</button></div>`;
    app.innerHTML=html; return;
  }

  if(S.screen==="setup"&&S.setup){
    const sd=S.setup;
    html+=`<div class="hdr"><button class="back-btn" onclick="set({screen:'grupos'})">← Grupos</button><div style="flex:1;font-weight:600;font-size:18px;letter-spacing:-.3px;">${sd.nombre||"Nuevo grupo"}</div></div>`;
    html+=`<div class="section"><div class="lbl">Nombre del grupo</div><input class="setup-input" value="${sd.nombre}" oninput="S.setup.nombre=this.value"></div>`;
    html+=`<div class="section"><div class="lbl">Participantes</div><div class="num-btns">`;
    [2,3,4,5,6].forEach(n=>html+=`<button class="num-btn ${pc(sd.n===n)}" onclick="setupN(${n})">${n}</button>`);
    html+=`</div></div>`;
    html+=`<div class="section"><div class="lbl">Nombres</div><div style="display:flex;flex-direction:column;gap:6px;">`;
    for(let i=0;i<sd.n;i++){
      const pl=p(i);
      html+=`<div class="row card" style="border-left:3px solid ${pl.accent};padding:9px 13px;">${av(sd.nombres[i]||"?",i,30)}<input class="name-input" value="${sd.nombres[i]||""}" placeholder="Persona ${i+1}" oninput="S.setup.nombres[${i}]=this.value"></div>`;
    }
    html+=`</div></div>`;
    html+=`<div class="section"><div class="lbl">Preferencia de tickets</div><div style="display:flex;flex-direction:column;gap:6px;">`;
    [{key:"eficiente",label:"Más eficiente",desc:"Mezcla libremente 5€ y 8€"},
     {key:"88",label:"Solo 8€",desc:"Únicamente tickets de 8€"},
     {key:"85",label:"8€ y 5€",desc:"Al menos un ticket de cada tipo"},
     {key:"55",label:"Solo 5€",desc:"Únicamente tickets de 5€"},
    ].forEach(op=>{
      const on=sd.modo===op.key;
      html+=`<button onclick="S.setup.modo='${op.key}';render();" class="row ${pc(on)}" style="padding:11px 14px;border-radius:var(--r1);text-align:left;">
        <div style="width:16px;height:16px;border-radius:50%;flex-shrink:0;background:var(--bg);border:${on?"5px solid var(--purple)":"1.5px solid var(--border2)"};"></div>
        <div><div style="font-size:14px;">${op.label}</div><div style="font-size:12px;color:var(--text3);margin-top:2px;">${op.desc}</div></div>
      </button>`;
    });
    html+=`</div></div>`;
    html+=`<button class="btn" onclick="confirmSetup()">Guardar y entrar</button>`;
    app.innerHTML=html; return;
  }

  if(S.screen==="app"){
    const g=gr();
    // Header + tabs siempre
    html+=`<div class="hdr">
      <button class="back-btn" onclick="goGrupos()">← Grupos</button>
      <div style="flex:1;"><div class="hdr-title">${g.nombre}</div><div class="hdr-sub">${g.n} personas · tickets 5€ y 8€</div></div>
      <button class="ghost-btn" onclick="editGrupo(${S.gi})">Editar</button>
    </div>`;
    html+=`<div class="tabs">${["calc","saldos","historial"].map((k,j)=>`<button class="tab${S.tab===k?" on":""}" onclick="set({tab:'${k}'})">${["Calculadora","Saldos","Historial"][j]}</button>`).join("")}</div>`;

    if(S.tab==="calc"){
      html+=`<div class="section">
        <div class="lbl">Tickets</div>
        <div class="modo-btns">${[{k:"eficiente",l:"Eficiente"},{k:"88",l:"Solo 8€"},{k:"85",l:"8€+5€"},{k:"55",l:"Solo 5€"}].map(o=>`<button class="modo-btn ${pc(g.modo===o.k)}" onclick="setModo('${o.k}')">${o.l}</button>`).join("")}</div>
        <div class="lbl">Total de la cuenta</div>
        <div class="total-wrap"><input id="total-inp" type="text" inputmode="decimal" placeholder="0,00" value="${S.total}" oninput="onTotal(this.value)"><span class="total-eur">€</span></div>
      </div>`;
      html+=`<div id="resultado"></div>`;
    }

    else if(S.tab==="saldos"){
      if(S.flash)html+=`<div class="flash">✓ Comida guardada y saldos actualizados</div>`;
      html+=`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem;">`;
      for(let i=0;i<g.n;i++){
        const pl=p(i);
        html+=`<div class="row card" style="border-left:3px solid ${pl.accent};">
          ${av(g.nombres[i],i,36)}
          <div style="flex:1;">
            ${S.editIdx===i
              ?`<input class="edit-input" value="${g.nombres[i]}" autofocus onblur="saveNm(${i},this.value)" onkeydown="if(event.key==='Enter')saveNm(${i},this.value);if(event.key==='Escape')set({editIdx:null});">`
              :`<div style="display:flex;align-items:center;gap:8px;"><span style="font-weight:500;font-size:14px;">${g.nombres[i]}</span><button style="font-size:11px;color:var(--text3);" onclick="set({editIdx:${i}})">editar</button></div>`
            }
            <div style="font-size:11px;color:var(--text3);margin-top:3px;">${g.saldos[i]<-.005?"el grupo le debe":g.saldos[i]>.005?"debe al grupo":"al día"}</div>
          </div>
          ${sb(g.saldos[i])}
        </div>`;
      }
      html+=`</div><button class="danger-btn" style="font-size:12px;" onclick="resetSaldos()">Resetear saldos e historial</button>`;
    }

    else if(S.tab==="historial"){
      if(!g.historial.length){html+=`<div class="empty"><div class="empty-icon">☕</div>Todavía no hay comidas registradas</div>`;}
      else g.historial.forEach(h=>{
        html+=`<div class="h-card"><div class="row" style="margin-bottom:10px;"><span style="font-weight:500;font-size:14px;flex:1;">${h.fecha}</span><span style="font-size:13px;color:var(--text3);">${h.total.toFixed(2)}€</span></div><div style="display:flex;flex-direction:column;gap:5px;">`;
        h.gastos.forEach((gs,i)=>{const pl=p(i);html+=`<div class="h-row" style="border-left-color:${pl.accent};gap:10px;">${av(h.nombres?.[i]||`P${i+1}`,i,22)}<span style="font-size:13px;color:var(--text2);flex:1;">${h.nombres?.[i]||`P${i+1}`}</span><span style="font-size:14px;font-weight:500;">${gs.toFixed(2)}€</span></div>`;});
        html+=`</div></div>`;
      });
    }

    app.innerHTML=html;

    // Renderizar resultado sin tocar el input
    if(S.tab==="calc") renderResultado();
  }
}

function renderResultado(){
  const el=document.getElementById("resultado");
  if(!el)return;
  const g=gr(), total=parseMonto(S.total), sol=S.sol;
  if(!sol||!total||total<=0){
    el.innerHTML=(total>0&&!sol)?`<div class="err">Sin combinación válida para ese importe.</div>`:"";
    return;
  }
  const efIdx=sol.diff<-0.01?(()=>{let idx=0,best=-Infinity;for(let i=0;i<g.n;i++){const s=g.saldos[i]+(sol.pagado/g.n-sol.gastos[i])*.01;if(s>best){best=s;idx=i;}}return idx;})():null;
  const dL=sol.diff===0?"Exacto":sol.diff>0?"Se regalan":"Faltan";
  const dV=sol.diff===0?"✓":`${Math.abs(sol.diff).toFixed(2)}€`;
  const dBg=sol.diff===0?"var(--green-bg)":sol.diff>0?"var(--orange-bg)":"var(--red-bg)";
  const dC=sol.diff===0?"var(--green-text)":sol.diff>0?"var(--orange-text)":"var(--red-text)";

  let html=`<div class="stats">
    <div class="stat" style="background:var(--bg2);"><div class="stat-lbl" style="color:var(--text3);">Cuenta</div><div class="stat-val" style="color:var(--text2);">${total.toFixed(2)}€</div></div>
    <div class="stat" style="background:var(--bg2);"><div class="stat-lbl" style="color:var(--text3);">Con tickets</div><div class="stat-val" style="color:var(--text2);">${sol.pagado.toFixed(2)}€</div></div>
    <div class="stat" style="background:${dBg};"><div class="stat-lbl" style="color:${dC};">${dL}</div><div class="stat-val" style="color:${dC};">${dV}</div></div>
  </div>`;

  if(efIdx!==null){
    html+=`<div class="ef-banner">${av(g.nombres[efIdx],efIdx,32)}<div><div class="ef-name">${g.nombres[efIdx]} paga ${Math.abs(sol.diff).toFixed(2)}€ en efectivo</div><div class="ef-reason">${g.saldos[efIdx]>.01?`Debe ${g.saldos[efIdx].toFixed(2)}€ al grupo acumulados`:"Es quien menos ha puesto en tickets esta vez"}</div></div></div>`;
  }

  for(let i=0;i<g.n;i++){
    const pl=p(i);
    const [t5,t8]=sol.asig[i];
    const gasto=sol.gastos[i],ideal=sol.pagado/g.n,ex=Math.round((gasto-ideal)*100)/100;
    const tks=[t8>0?`${t8}×8€`:"",t5>0?`${t5}×5€`:""].filter(Boolean).join(" + ")||"—";
    const esEf=efIdx===i;
    html+=`<div class="p-card" style="border-left-color:${esEf?"var(--red-text)":pl.accent};">
      ${av(g.nombres[i],i,36)}
      <div style="flex:1;min-width:0;">
        <div style="font-weight:500;font-size:14px;margin-bottom:2px;">${g.nombres[i]}</div>
        <div style="font-size:12px;color:var(--text3);font-family:monospace;">${tks}${esEf&&sol.diff<-0.01?` + ${Math.abs(sol.diff).toFixed(2)}€ ef.`:""}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:19px;font-weight:600;letter-spacing:-.3px;">${(esEf&&sol.diff<-0.01?gasto+Math.abs(sol.diff):gasto).toFixed(2)}€</div>
        ${Math.abs(ex)>.01?`<div style="font-size:11px;color:${ex>0?"var(--red-text)":"var(--green-text)"};">${ex>0?`+${ex.toFixed(2)}€ de más`:`${Math.abs(ex).toFixed(2)}€ de menos`}</div>`:""}
      </div>
    </div>`;
  }

  if(!S.conf){html+=`<button class="btn" onclick="set({conf:true})">Confirmar y guardar saldos</button>`;}
  else{html+=`<div class="confirm-row"><button class="btn" onclick="confirmarPago()">Confirmar</button><button class="btn-sec" onclick="set({conf:false})">Cancelar</button></div>`;}

  el.innerHTML=html;
}

// ── Acciones ──
function openGrupo(i){S.gi=i;S.total="";S.sol=null;S.tab="calc";S.screen="app";save({grupos:S.grupos,gi:i,screen:"app"});render();}
function editGrupo(i){S.gi=i;S.setup={...S.grupos[i],nombres:[...S.grupos[i].nombres],saldos:[...S.grupos[i].saldos]};S.screen="setup";render();}
function goGrupos(){S.screen="grupos";save({grupos:S.grupos,gi:S.gi,screen:"grupos"});render();}

function addGrupo(){
  const nm=S.nNombre.trim()||`Grupo ${S.grupos.length+1}`;
  const ng={id:Date.now(),nombre:nm,n:3,nombres:["Persona 1","Persona 2","Persona 3"],saldos:[0,0,0],historial:[],modo:"eficiente"};
  S.grupos=[...S.grupos,ng];S.gi=S.grupos.length-1;
  S.setup={...ng,nombres:[...ng.nombres],saldos:[...ng.saldos]};
  S.nNombre="";S.screen="setup";save({grupos:S.grupos,gi:S.gi,screen:"setup"});render();
}

function delGrupo(i){S.modal={msg:`Se eliminará "${S.grupos[i].nombre}" con todos sus saldos e historial.`,action:"delete",idx:i};render();}
function resetSaldos(){S.modal={msg:`Se borrarán todos los saldos e historial de "${gr().nombre}". Esta acción no se puede deshacer.`,action:"reset"};render();}
function closeModal(){S.modal=null;render();}
function confirmModal(){
  const m=S.modal;
  if(m.action==="delete"){
    let next=S.grupos.filter((_,i)=>i!==m.idx);
    if(!next.length)next=[{id:Date.now(),nombre:"Grupo 1",n:3,nombres:["Persona 1","Persona 2","Persona 3"],saldos:[0,0,0],historial:[],modo:"eficiente"}];
    S.grupos=next;S.gi=0;S.screen="grupos";save({grupos:S.grupos,gi:0,screen:"grupos"});
  }else if(m.action==="reset"){upGr({saldos:Array(gr().n).fill(0),historial:[]});}
  S.modal=null;render();
}

function setupN(n){
  const s=S.setup;
  const nms=[...s.nombres];while(nms.length<n)nms.push(`Persona ${nms.length+1}`);
  const sls=[...s.saldos];while(sls.length<n)sls.push(0);
  S.setup={...s,n,nombres:nms.slice(0,n),saldos:sls.slice(0,n)};render();
}

function confirmSetup(){
  const sd=S.setup;
  const pat={...sd,nombres:sd.nombres.map((nm,i)=>nm.trim()||`Persona ${i+1}`)};
  S.grupos=S.grupos.map((g,i)=>i===S.gi?pat:g);
  save({grupos:S.grupos,gi:S.gi,screen:"app"});
  S.total="";S.sol=null;S.screen="app";S.tab="calc";render();
}

function setModo(modo){upGr({modo});S.conf=false;S.sol=S.total?calcular(parseMonto(S.total),gr().saldos,gr().n,modo):null;render();}

function onTotal(val){
  S.total=val;S.conf=false;
  const t=parseMonto(val);
  S.sol=(!t||t<=0)?null:calcular(t,gr().saldos,gr().n,gr().modo);
  // Solo actualizar el resultado, NO hacer render() completo
  renderResultado();
}

function confirmarPago(){
  const sol=S.sol;if(!sol)return;
  const t=parseMonto(S.total),ideal=sol.pagado/gr().n;
  upGr({
    saldos:gr().saldos.map((s,i)=>Math.round((s+(ideal-sol.gastos[i]))*100)/100),
    historial:[{fecha:new Date().toLocaleDateString("es-ES"),total:t,pagado:sol.pagado,gastos:sol.gastos,nombres:[...gr().nombres]},...gr().historial]
  });
  S.total="";S.sol=null;S.conf=false;S.flash=true;S.tab="saldos";
  setTimeout(()=>{S.flash=false;render();},2500);render();
}

function saveNm(i,val){
  if(val.trim()){const nm=[...gr().nombres];nm[i]=val.trim();upGr({nombres:nm});}
  S.editIdx=null;render();
}

// ── Init ──
const saved=load();
if(saved){
  if(saved.grupos)S.grupos=saved.grupos;
  if(saved.gi!==undefined)S.gi=saved.gi;
  if(saved.screen)S.screen=saved.screen;
}
render();
</script>
